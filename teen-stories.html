<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories - GeoFroggy</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/teen-dashboard.css">
    <style>
        .stories-hero {
            padding: 20px 0;
            margin-bottom: 20px;
        }

        .stories-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: #1e293b;
        }

        .stories-hero p {
            font-size: 1rem;
            color: #64748b;
            max-width: 600px;
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .filter-btn {
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: var(--primary-purple);
            color: white;
            border-color: var(--primary-purple);
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
        }

        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .story-card-premium {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid #f1f5f9;
        }

        .story-card-premium:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .story-card-img {
            height: 200px;
            position: relative;
            overflow: hidden;
        }

        .story-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .story-card-premium:hover .story-card-img img {
            transform: scale(1.1);
        }

        .card-category {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary-purple);
            z-index: 2;
        }

        .story-card-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .story-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .story-card-excerpt {
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.4;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .story-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }

        .story-card-meta {
            display: flex;
            gap: 15px;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .story-card-meta i {
            margin-right: 5px;
        }

        .btn-read {
            color: var(--primary-purple);
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-read:hover {
            color: #4f46e5;
        }

        /* Loading Skeleton */
        .skeleton {
            background: #f1f5f9;
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite linear;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

<body>
    <!-- Sidebar Component -->
    <div id="sidebar-placeholder"></div>

    <div class="main-wrapper">
        <!-- Header Component -->
        <div id="header-placeholder"></div>

        <main class="dash-content-full">
            <div class="container-fluid px-4 px-lg-5">
                <section class="stories-hero">
                    <h1>Explore the World through Stories</h1>
                    <p>Immerse yourself in fascinating tales of history, culture, and nature from every corner of the globe.</p>
                </section>

                <div class="filter-tabs">
                    <button class="filter-btn active" data-filter="all">All Stories</button>
                    <button class="filter-btn" data-filter="history">History</button>
                    <button class="filter-btn" data-filter="culture">Culture</button>
                    <button class="filter-btn" data-filter="nature">Nature</button>
                    <button class="filter-btn" data-filter="mystery">Mystery</button>
                </div>

                <div id="stories-grid" class="stories-grid">
                    <!-- Loading Skeletons -->
                    <div class="story-card-premium">
                        <div class="story-card-img skeleton"></div>
                        <div class="story-card-body">
                            <div class="skeleton" style="height: 24px; width: 80%; margin-bottom: 12px; border-radius: 4px;"></div>
                            <div class="skeleton" style="height: 60px; width: 100%; margin-bottom: 20px; border-radius: 4px;"></div>
                            <div class="story-card-footer">
                                <div class="skeleton" style="height: 16px; width: 100px; border-radius: 4px;"></div>
                                <div class="skeleton" style="height: 16px; width: 60px; border-radius: 4px;"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Repeat skeletons as needed -->
                </div>
            </div>
        </main>

        <!-- Footer Component -->
        <div id="footer-placeholder"></div>
    </div>

    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/teen-components.js"></script>
    <script src="/js/teen-stories.js"></script>
</body>

</html>
