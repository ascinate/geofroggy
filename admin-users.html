<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management | Geofroggy</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">

    <!-- Custom Styles -->
    <link href="/css/admin-layout.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Blobs */
        .bg-blobs {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            filter: blur(120px);
            opacity: 0.5;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: move 25s infinite alternate;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            right: -100px;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: -100px;
            left: -100px;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 50px) scale(1.05); }
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 1rem 1.5rem;
            max-width: calc(100vw - var(--sidebar-width));
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Tabs */
        .nav-tabs-custom {
            border-bottom: 1px solid var(--border);
            gap: 2rem;
            margin-bottom: 1.5rem;
        }

        .nav-tabs-custom .nav-link {
            background: none !important;
            border: none !important;
            color: var(--text-dim);
            padding: 0.75rem 0;
            font-weight: 700;
            font-size: 0.875rem;
            position: relative;
            transition: color 0.3s;
        }

        .nav-tabs-custom .nav-link.active {
            color: white !important;
        }

        .nav-tabs-custom .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border-radius: 2px;
        }

        /* Content Card */
        .content-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
        }

        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            transition: opacity 0.4s;
        }

        @media (max-width: 1200px) {
            .main-content {
                margin-left: 0;
                max-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Sidebar Placeholder -->
    <div id="admin-sidebar-placeholder"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header mb-4">
            <div>
                <h1>User Management</h1>
                <p>Monitor and manage all users and administrators.</p>
            </div>
            <div class="header-actions">
                <button class="btn-glass">
                    <i class="ri-download-2-line"></i> Export Data
                </button>
                <button class="btn-primary-custom" onclick="showAddUserModal()">
                    <i class="ri-user-add-line"></i> Add New Admin
                </button>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs nav-tabs-custom" id="userTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="normal-users-tab" data-bs-toggle="tab" data-bs-target="#normal-users"
                    type="button" role="tab" aria-controls="normal-users" aria-selected="true">
                    Normal Users
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="admins-tab" data-bs-toggle="tab" data-bs-target="#admins" type="button"
                    role="tab" aria-controls="admins" aria-selected="false">
                    Administrators
                </button>
            </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content position-relative" id="userTabsContent" style="min-height: 400px;">
            <div id="table-loader" class="loader-overlay">
                <div class="text-center">
                    <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
                    <div class="h5 text-white mb-1">Synchronizing Data</div>
                    <div class="small text-dim">Fetching latest user records...</div>
                </div>
            </div>

            <!-- Normal Users Tab -->
            <div class="tab-pane fade show active" id="normal-users" role="tabpanel" aria-labelledby="normal-users-tab">
                <div class="content-card">
                    <table id="normalUsersTable" class="table table-custom dt-responsive nowrap" style="width:100%">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Email</th>
                                <th>Level</th>
                                <th>XP Points</th>
                                <th>Tokens</th>
                                <th>Status</th>
                                <th>Joined Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Admins Tab -->
            <div class="tab-pane fade" id="admins" role="tabpanel" aria-labelledby="admins-tab">
                <div class="content-card">
                    <table id="adminsTable" class="table table-custom dt-responsive nowrap" style="width:100%">
                        <thead>
                            <tr>
                                <th>Administrator</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Permissions</th>
                                <th>Status</th>
                                <th>Joined Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Footer Placeholder -->
        <div id="admin-footer-placeholder"></div>
    </main>

    <!-- Modal for Add User -->
    <div class="modal fade" id="addUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary shadow-lg" style="border: 1px solid var(--border) !important; background: #0f172a !important;">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white">Add New Admin User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm" class="row g-3">
                        <div class="col-12">
                            <label class="form-label text-dim small fw-bold">Username</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white" id="addUserName" required placeholder="Enter username">
                        </div>
                        <div class="col-12">
                            <label class="form-label text-dim small fw-bold">Email Address</label>
                            <input type="email" class="form-control bg-dark border-secondary text-white" id="addUserEmail" required placeholder="Enter email address">
                        </div>
                        <div class="col-12">
                            <label class="form-label text-dim small fw-bold">Password</label>
                            <input type="password" class="form-control bg-dark border-secondary text-white" id="addUserPassword" required placeholder="Enter password">
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-glass" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary-custom" id="confirmAddUserBtn">Add Admin</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Edit User -->
    <div class="modal fade" id="editUserModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark border-secondary shadow-lg" style="border: 1px solid var(--border) !important; background: #0f172a !important;">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white">Edit User Profile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editUserForm" class="row g-3">
                        <input type="hidden" id="editUserId">
                        <div class="col-12">
                            <label class="form-label text-dim small fw-bold">Username</label>
                            <input type="text" class="form-control bg-dark border-secondary text-white" id="editUserName" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label text-dim small fw-bold">Email Address (Read-only)</label>
                            <input type="email" class="form-control bg-dark border-secondary text-white opacity-50" id="editUserEmail" disabled>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-dim small fw-bold">Role</label>
                            <select class="form-select bg-dark border-secondary text-white" id="editUserRole">
                                <option value="user">User</option>
                                <option value="parent">Parent</option>
                                <option value="teacher">Teacher</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-dim small fw-bold">Age Group</label>
                            <select class="form-select bg-dark border-secondary text-white" id="editUserAge">
                                <option value="child">Child</option>
                                <option value="teen">Teen</option>
                                <option value="adult">Adult</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-glass" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary-custom" id="confirmEditUserBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/admin-components.js"></script>

    <script>
        $(document).ready(function() {
            const apiUrl = `${window.APP_CONFIG.API_BASE_URL}/api/auth/admin/users`;
            const token = localStorage.getItem('token');

            // Initialize DataTables with empty data initially
            const normalUsersTable = $('#normalUsersTable').DataTable({
                responsive: true,
                dom: '<"d-flex justify-content-between align-items-center mb-3"lf>rt<"d-flex justify-content-between align-items-center mt-3"ip>',
                language: {
                    search: "_INPUT_",
                    searchPlaceholder: "Search users...",
                    lengthMenu: "Show _MENU_",
                },
                columns: [
                    { data: null, render: data => `
                        <div class="user-cell">
                            <img src="${data.avatar_url || `https://ui-avatars.com/api/?name=${data.username}`}" class="user-avatar" alt="">
                            <div class="fw-bold">${data.username}</div>
                        </div>
                    `},
                    { data: 'email' },
                    { data: 'stats', render: stats => {
                        const s = Array.isArray(stats) ? stats[0] : stats;
                        return `<span class="badge bg-primary-subtle text-primary border-0">Lvl ${s ? s.level || 1 : 1}</span>`;
                    }},
                    { data: 'stats', render: stats => {
                        const s = Array.isArray(stats) ? stats[0] : stats;
                        return `<span class="fw-bold">${(s ? s.xp || 0 : 0).toLocaleString()}</span>`;
                    }},
                    { data: 'stats', render: stats => {
                        const s = Array.isArray(stats) ? stats[0] : stats;
                        return `<span class="text-warning"><i class="ri-coin-line"></i> ${s ? s.tokens || 0 : 0}</span>`;
                    }},
                    { data: 'role', render: role => {
                        const badgeClass = role === 'admin' ? 'status-active' : 'status-active';
                        return `<span class="status-badge ${badgeClass}">${role || 'user'}</span>`;
                    }},
                    { data: 'created_at', render: date => date ? new Date(date).toLocaleDateString() : 'N/A' },
                    { data: null, render: (data) => `
                        <div class="d-flex gap-2">
                            <button class="action-btn edit-user" data-id="${data.id}" title="Edit"><i class="ri-edit-line"></i></button>
                            <button class="action-btn text-danger delete-user" data-id="${data.id}" title="Delete"><i class="ri-delete-bin-line"></i></button>
                        </div>
                    `}
                ],
                drawCallback: function() {
                    bindActions();
                }
            });

            const adminsTable = $('#adminsTable').DataTable({
                responsive: true,
                dom: '<"d-flex justify-content-between align-items-center mb-3"lf>rt<"d-flex justify-content-between align-items-center mt-3"ip>',
                language: {
                    search: "_INPUT_",
                    searchPlaceholder: "Search admins...",
                    lengthMenu: "Show _MENU_",
                },
                columns: [
                    { data: null, render: data => `
                        <div class="user-cell">
                            <img src="${data.avatar_url || `https://ui-avatars.com/api/?name=${data.username}`}" class="user-avatar" alt="">
                            <div class="fw-bold">${data.username}</div>
                        </div>
                    `},
                    { data: 'email' },
                    { data: 'role', render: role => `<span class="text-uppercase small fw-bold">${role}</span>` },
                    { data: 'role', render: role => role === 'admin' ? 'Super Admin' : 'Staff' },
                    { data: 'role', render: () => `<span class="status-badge status-active">Active</span>` },
                    { data: 'created_at', render: date => date ? new Date(date).toLocaleDateString() : 'N/A' },
                    { data: null, render: (data) => `
                        <div class="d-flex gap-2">
                            <button class="action-btn edit-user" data-id="${data.id}" title="Edit"><i class="ri-edit-line"></i></button>
                            <button class="action-btn text-danger delete-user" data-id="${data.id}" title="Delete"><i class="ri-delete-bin-line"></i></button>
                        </div>
                    `}
                ],
                drawCallback: function() {
                    bindActions();
                }
            });

            // Action Functions
            window.showAddUserModal = function() {
                const modal = new bootstrap.Modal(document.getElementById('addUserModal'));
                document.getElementById('addUserForm').reset();
                modal.show();
            }

            window.showEditUserModal = function(userData) {
                const modal = new bootstrap.Modal(document.getElementById('editUserModal'));
                document.getElementById('editUserId').value = userData.id;
                document.getElementById('editUserName').value = userData.username;
                document.getElementById('editUserEmail').value = userData.email;
                document.getElementById('editUserRole').value = userData.role || 'user';
                document.getElementById('editUserAge').value = userData.age_group || 'adult';
                modal.show();
            }

            function bindActions() {
                $('.edit-user').off().on('click', function() {
                    const id = $(this).data('id');
                    const allData = [...normalUsersTable.rows().data().toArray(), ...adminsTable.rows().data().toArray()];
                    const user = allData.find(u => u.id === id);
                    if (user) showEditUserModal(user);
                });

                $('.delete-user').off().on('click', function() {
                    const id = $(this).data('id');
                    if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                        deleteUser(id);
                    }
                });
            }

            async function deleteUser(id) {
                try {
                    const response = await fetch(`${apiUrl}/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        fetchUsers();
                    } else {
                        alert('Error: ' + result.error);
                    }
                } catch (err) {
                    console.error('Delete failed:', err);
                }
            }

            $('#confirmAddUserBtn').on('click', async function() {
                const payload = {
                    username: document.getElementById('addUserName').value,
                    email: document.getElementById('addUserEmail').value,
                    password: document.getElementById('addUserPassword').value,
                    role: 'admin', // Default role as requested
                    age_group: 'adult' // Default age group
                };

                if (!payload.username || !payload.email || !payload.password) {
                    alert('Please fill all required fields');
                    return;
                }

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                        fetchUsers();
                    } else {
                        alert('Error: ' + result.error);
                    }
                } catch (err) {
                    console.error('Save failed:', err);
                }
            });

            $('#confirmEditUserBtn').on('click', async function() {
                const id = document.getElementById('editUserId').value;
                const payload = {
                    username: document.getElementById('editUserName').value,
                    role: document.getElementById('editUserRole').value,
                    age_group: document.getElementById('editUserAge').value,
                };

                if (!payload.username) {
                    alert('Username is required');
                    return;
                }

                try {
                    const response = await fetch(`${apiUrl}/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                        fetchUsers();
                    } else {
                        alert('Error: ' + result.error);
                    }
                } catch (err) {
                    console.error('Save failed:', err);
                }
            });

            // Fetch users from API
            async function fetchUsers() {
                try {
                    $('#table-loader').show();
                    const response = await fetch(apiUrl, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        const allUsers = result.data;
                        const normalUsers = allUsers.filter(u => u.role !== 'admin' && u.role !== 'staff');
                        const adminUsers = allUsers.filter(u => u.role === 'admin' || u.role === 'staff');
                        
                        normalUsersTable.clear().rows.add(normalUsers).draw();
                        adminsTable.clear().rows.add(adminUsers).draw();
                        $('#table-loader').fadeOut(400);
                    } else {
                        $('#table-loader').html(`<div class="text-danger fw-bold">Error: ${result.error}</div>`);
                    }
                } catch (error) {
                    $('#table-loader').html('<div class="text-danger fw-bold">Connection Error</div>');
                }
            }

            fetchUsers();

            // Re-adjust columns when switching tabs
            $('button[data-bs-toggle="tab"]').on('shown.bs.tab', function (e) {
                $.fn.dataTable.tables({ visible: true, api: true }).columns.adjust().responsive.recalc();
            });
        });
    </script>
</body>

</html>
