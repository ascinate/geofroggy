<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories Management | Geofroggy</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css">

    <!-- Custom Styles -->
    <link href="/css/admin-layout.css" rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .bg-blobs { position: fixed; width: 100%; height: 100%; overflow: hidden; z-index: -1; filter: blur(120px); opacity: 0.5; }
        .blob { position: absolute; border-radius: 50%; animation: move 25s infinite alternate; }
        .blob-1 { width: 600px; height: 600px; background: var(--primary); top: -200px; right: -100px; }
        .blob-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -100px; left: -100px; }

        @keyframes move { from { transform: translate(0, 0) scale(1); } to { transform: translate(50px, 50px) scale(1.05); } }

        .main-content { margin-left: var(--sidebar-width); flex-grow: 1; padding: 1rem 1.5rem; max-width: calc(100vw - var(--sidebar-width)); animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .content-card { background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.5); padding: 1.5rem; }

        .story-thumbnail { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; margin-right: 12px; }

        @media (max-width: 1200px) { .main-content { margin-left: 0; max-width: 100%; } }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="admin-sidebar-placeholder"></div>

    <main class="main-content">
        <div class="header mb-4">
            <div>
                <h1>Stories Management</h1>
                <p>Manage educational content and cultural narratives.</p>
            </div>
            <div class="header-actions">
                <button class="btn-primary-custom">
                    <i class="ri-add-line"></i> New Story
                </button>
            </div>
        </div>

        <div class="content-card">
            <table id="storiesTable" class="table table-custom dt-responsive nowrap" style="width:100%">
                <thead>
                    <tr>
                        <th>Story</th>
                        <th>Country</th>
                        <th>Views</th>
                        <th>Completion</th>
                        <th>Status</th>
                        <th>Last Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="d-flex align-items-center">
                                <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=100&h=100&fit=crop" class="story-thumbnail" alt="">
                                <div>
                                    <div class="fw-bold">The Secrets of the Eiffel Tower</div>
                                    <div class="text-dim small">Historical narrative</div>
                                </div>
                            </div>
                        </td>
                        <td>France</td>
                        <td>4,520</td>
                        <td>88%</td>
                        <td><span class="status-badge status-published">Published</span></td>
                        <td>2 days ago</td>
                        <td>
                            <div class="d-flex gap-2">
                                <button class="action-btn" title="Edit"><i class="ri-edit-line"></i></button>
                                <button class="action-btn" title="Preview"><i class="ri-eye-line"></i></button>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <div class="d-flex align-items-center">
                                <img src="https://images.unsplash.com/photo-1528164344705-47542687000d?w=100&h=100&fit=crop" class="story-thumbnail" alt="">
                                <div>
                                    <div class="fw-bold">Samurai Legends</div>
                                    <div class="text-dim small">Cultural history</div>
                                </div>
                            </div>
                        </td>
                        <td>Japan</td>
                        <td>2,140</td>
                        <td>92%</td>
                        <td><span class="status-badge status-published">Published</span></td>
                        <td>1 week ago</td>
                        <td>
                            <div class="d-flex gap-2">
                                <button class="action-btn" title="Edit"><i class="ri-edit-line"></i></button>
                                <button class="action-btn" title="Preview"><i class="ri-eye-line"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="admin-footer-placeholder"></div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
    <script src="/js/admin-components.js"></script>

    <script>
        $(document).ready(function() {
            $('#storiesTable').DataTable({
                responsive: true,
                dom: '<"d-flex justify-content-between align-items-center mb-3"lf>rt<"d-flex justify-content-between align-items-center mt-3"ip>',
                language: { search: "_INPUT_", searchPlaceholder: "Search stories..." }
            });
        });
    </script>
</body>

</html>
