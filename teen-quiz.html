<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Quiz - GeoFroggy</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/teen-dashboard.css">
    <link rel="stylesheet" href="/css/teen-quiz.css">
</head>

<body>
    <!-- Sidebar Component -->
    <div id="sidebar-placeholder"></div>

    <div class="main-wrapper">
        <!-- Header Component -->
        <div id="header-placeholder"></div>

        <main class="quiz-page-container">
            <div class="quiz-card" id="quiz-container">
                <!-- Loader Overlay -->
                <div class="quiz-loader-overlay" id="quiz-loader">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p style="font-weight: 700; color: #64748b;">Loading your quiz...</p>
                </div>

                <!-- Quiz Header -->
                <div class="quiz-header">
                    <div class="quiz-header-left">
                        <img src="" alt="Flag" class="quiz-country-flag" id="quiz-flag" style="display: none;">
                        <div class="quiz-header-info">
                            <h2 id="quiz-country-name">Loading...</h2>
                            <p id="quiz-title">Knowledge Challenge</p>
                        </div>
                    </div>
                    <div class="quiz-stats">
                        <div class="quiz-stat-item">
                            <span class="quiz-stat-label">Potential XP</span>
                            <span class="quiz-stat-value" id="potential-xp">+20</span>
                        </div>
                        <div class="quiz-stat-item">
                            <span class="quiz-stat-label">Accuracy</span>
                            <span class="quiz-stat-value" id="current-accuracy">0%</span>
                        </div>
                    </div>
                </div>

                <!-- Quiz Body -->
                <div class="quiz-body" id="quiz-question-area">
                    <div class="question-badge" id="question-number">Question 1 of 5</div>
                    <h1 class="question-text" id="question-text">Loading question...</h1>

                    <div class="options-grid" id="options-container">
                        <!-- Options will be injected here -->
                    </div>
                </div>

                <!-- Quiz Footer -->
                <div class="quiz-footer">
                    <div class="progress-container">
                        <div class="progress-info">
                            <span>Your Progress</span>
                            <span id="progress-text">0% Completed</span>
                        </div>
                        <div class="quiz-pbar">
                            <div class="quiz-pbar-fill" id="progress-bar" style="width: 0%;"></div>
                        </div>
                    </div>
                    <button class="btn-quiz-next" id="next-btn" disabled>
                        <span>Next Question</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- Quiz Results (Hidden by default) -->
            <div class="quiz-card" id="results-container" style="display: none;">
                <div class="results-container">
                    <img src="/assets/Teen-frog.png" alt="Mascot" class="results-mascot">
                    <h1 class="results-title">Quiz Completed!</h1>
                    <p class="results-subtitle" id="results-message">Great job! You've successfully finished the quiz.</p>
                    
                    <div class="score-circle">
                        <span class="score-value" id="final-score">0</span>
                        <span class="score-total" id="final-total">/ 5</span>
                    </div>

                    <div class="xp-earned-card">
                        <i class="fa-solid fa-bolt xp-icon"></i>
                        <div class="xp-text">
                            <div class="xp-label">Total XP Gained</div>
                            <div class="xp-amount" id="final-xp">+0</div>
                        </div>
                    </div>

                    <div class="results-actions">
                        <a href="teen-map.html" class="btn-results btn-results-secondary">Return to Map</a>
                        <a href="teen-dashboard.html" class="btn-results btn-results-primary">Go to Dashboard</a>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer Placeholder -->
        <div id="footer-placeholder"></div>
    </div>

    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/teen-components.js"></script>
    <script src="/js/teen-quiz.js"></script>
</body>

</html>
