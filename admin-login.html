<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Authentication | Geofroggy</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #8b5cf6;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #3b82f6;
            top: 40%;
            left: 30%;
            animation-delay: -10s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 50px) scale(1.1); }
        }

        /* Login Card */
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 3.5rem 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        inset 0 1px 1px rgba(255, 255, 255, 0.05);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand {
            text-align: center;
            margin-bottom: 3rem;
        }

        .brand img {
            width: 64px;
            height: auto;
            margin-bottom: 1.25rem;
            filter: drop-shadow(0 0 15px var(--primary-glow));
        }

        .brand h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(to bottom right, #fff 30%, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .brand p {
            color: var(--text-dim);
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.625rem;
        }

        .form-label {
            font-size: 0.813rem;
            font-weight: 600;
            color: var(--text-dim);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .forgot-link {
            font-size: 0.75rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #818cf8;
        }

        .input-wrapper {
            position: relative;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.875rem 1rem 0.875rem 3rem;
            color: white;
            font-size: 0.938rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            color: white;
            outline: none;
        }

        .input-icon {
            position: absolute;
            left: 1.125rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1.25rem;
            transition: color 0.2s;
        }

        .form-control:focus + .input-icon {
            color: var(--primary);
        }

        .toggle-password {
            position: absolute;
            right: 1.125rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 1.1rem;
            z-index: 10;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 14px;
            padding: 1rem;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.5rem;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
        }

        .footer a:hover {
            border-bottom-color: var(--text-main);
        }

        /* Success/Error States */
        .alert-custom {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.813rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        /* Shine Effect */
        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 20%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="auth-card">
        <div class="brand">
            <img src="/assets/geofogy-imgs.png" alt="Geofroggy" onerror="this.src='https://placehold.co/64x64/6366f1/white?text=G'">
            <h1>Admin Console</h1>
            <p>Access the mission control center</p>
        </div>

        <div id="login-alert" class="alert-custom">
            <i class="ri-error-warning-line"></i>
            <span>Invalid credentials. Please try again.</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <div class="label-row">
                    <label class="form-label">Email Address</label>
                </div>
                <div class="input-wrapper">
                    <input type="email" class="form-control" placeholder="name@geofroggy.com" required>
                    <i class="ri-mail-fill input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label class="form-label">Password</label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="password-input" class="form-control" placeholder="••••••••" required>
                    <i class="ri-lock-2-fill input-icon"></i>
                    <i class="ri-eye-off-line toggle-password" id="toggle-password"></i>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                <span>Sign In to Admin</span>
                <i class="ri-arrow-right-line"></i>
            </button>
        </form>

        <div class="footer">
            Not an administrator? <a href="login.html">Return to Portal</a>
        </div>
    </div>

    <script>
        // Toggle Password Visibility
        const passwordInput = document.getElementById('password-input');
        const toggleBtn = document.getElementById('toggle-password');

        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleBtn.className = type === 'password' ? 'ri-eye-off-line toggle-password' : 'ri-eye-line toggle-password';
        });

        // Form Submission
        const form = document.getElementById('login-form');
        const btn = document.getElementById('submit-btn');
        const alert = document.getElementById('login-alert');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI Feedback
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> <span>Authenticating...</span>';
            alert.style.display = 'none';

            // Simulate API call
            setTimeout(() => {
                // For demo purposes, we'll just redirect
                window.location.href = 'admin-dashboard.html';
            }, 1200);
        });
    </script>
</body>

</html>
