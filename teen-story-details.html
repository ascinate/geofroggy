<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Details - GeoFroggy</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/teen-dashboard.css">
    <style>
        :root {
            --story-purple: #6366f1;
            --story-purple-light: #eef2ff;
        }

        .story-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--story-purple);
            text-decoration: none;
            font-weight: 700;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .back-link:hover {
            transform: translateX(-5px);
            color: var(--story-purple);
        }

        .story-header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
            margin-bottom: 40px;
        }

        .story-info {
            flex: 1;
        }

        .category-badge {
            background: var(--story-purple-light);
            color: var(--story-purple);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        .story-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 900;
            color: #1e293b;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .story-meta-row {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #64748b;
            font-weight: 500;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-item i {
            color: #94a3b8;
        }

        .star-icon {
            color: #f59e0b !important;
        }

        .story-image-wrapper {
            flex: 0 0 450px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .story-image-wrapper img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .story-tabs {
            display: flex;
            gap: 30px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }

        .story-tab {
            padding: 12px 0;
            font-weight: 700;
            color: #64748b;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .story-tab.active {
            color: var(--story-purple);
        }

        .story-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--story-purple);
            border-radius: 50px;
        }

        .story-content-area {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #334155;
            max-width: 800px;
        }

        .story-content-area p {
            margin-bottom: 20px;
        }

        .quote-block {
            background: #f8fafc;
            border-radius: 20px;
            padding: 30px;
            margin: 40px 0;
            display: flex;
            gap: 20px;
            border: 1px solid #e2e8f0;
        }

        .quote-icon {
            color: var(--story-purple);
            font-size: 2.5rem;
            line-height: 1;
        }

        .quote-text-wrapper {
            flex: 1;
        }

        .quote-text {
            color: var(--story-purple);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
            font-family: 'Playfair Display', serif;
        }

        .quote-author {
            color: #64748b;
            font-weight: 600;
            font-size: 0.95rem;
        }

        #complete-btn-container {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
        }

        .btn-complete {
            background: var(--primary-purple);
            color: white;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            border: none;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            transition: all 0.3s;
        }

        .btn-complete:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
            background: #4f46e5;
            color: white;
        }

        .btn-complete:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .completed-state {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 20px;
            border-radius: 16px;
            color: #166534;
        }

        .completed-icon {
            width: 40px;
            height: 40px;
            background: #22c55e;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        @media (max-width: 992px) {
            .story-header-section {
                flex-direction: column;
            }
            .story-image-wrapper {
                flex: none;
                width: 100%;
            }
            .story-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar Component -->
    <div id="sidebar-placeholder"></div>

    <div class="main-wrapper">
        <!-- Header Component -->
        <div id="header-placeholder"></div>

        <main class="dash-content-full">
            <div class="story-container">
                <a href="teen-stories.html" class="back-link">
                    <i class="fa-solid fa-chevron-left"></i> Back to Stories
                </a>

                <div class="story-header-section">
                    <div class="story-info">
                        <span class="category-badge" id="story-category">History</span>
                        <h1 class="story-title" id="story-title">Loading Story...</h1>
                        <div class="story-meta-row">
                            <div class="meta-item">
                                <i class="fa-regular fa-clock"></i>
                                <span id="read-time">--</span> min read
                            </div>
                            <div class="meta-item">
                                <i class="fa-regular fa-file-lines"></i>
                                <span id="word-count">--</span> words
                            </div>
                            <div class="meta-item">
                                <i class="fa-solid fa-star star-icon"></i>
                                <span id="story-rating">4.8 (128)</span>
                            </div>
                        </div>
                    </div>
                    <div class="story-image-wrapper">
                        <img id="story-banner" src="/assets/mascot_landscape.png" alt="Story Hero">
                    </div>
                </div>

                <div class="story-tabs">
                    <div class="story-tab active">Story</div>
                    <div class="story-tab">Key Facts</div>
                    <div class="story-tab">Think & Reflect</div>
                    <div class="story-tab">Quiz (5)</div>
                </div>

                <div class="story-content-area" id="story-content">
                    <!-- Dynamic content will be loaded here -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading content...</span>
                        </div>
                    </div>
                </div>

                <!-- Complete Button Container -->
                <div id="complete-btn-container" style="display: none;">
                    <button id="mark-complete-btn" class="btn-complete">
                        Complete Story & Earn XP
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer Component -->
        <div id="footer-placeholder"></div>
    </div>

    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/teen-components.js"></script>
    <script src="/js/teen-story-details.js"></script>
</body>

</html>
