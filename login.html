<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geofroggy Login</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for quick icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        body {
            background-image: url('/assets/fb-footer.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .auth-container {
            padding: 100px 0 140px 0;
            background: none !important;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card-wrapper {
            max-width: 500px;
            width: 100%;
            margin: auto;
            position: relative;
            z-index: 10;
        }

        .auth-tabs {
            margin: 0 auto 15px !important;
            border-bottom: 2px solid #ecd8b9 !important;
            background: none !important;
            padding: 0 !important;
            width: 80%;
            justify-content: center;
        }

        .auth-tab {
            background: none !important;
            backdrop-filter: none !important;
            border: none !important;
            padding: 10px 20px !important;
            margin: 0 10px !important;
            font-size: 17px !important;
            font-weight: 800 !important;
            transition: all 0.3s;
            color: #451a03 !important;
            opacity: 0.5;
            position: relative;
        }

        .auth-tab.active {
            opacity: 1;
            color: #ffffff !important;
            background: linear-gradient(146deg, #8fb93c 0%, #274f14c4 100%) !important;
        }


        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: #d4a33b;
            border-radius: 3px;
            display: block !important;
        }

        .auth-card-main {
            background: url('/assets/bg-card.png') no-repeat center center;
            background-size: 100% 100%;
            padding: 60px 0;
            position: relative;
            z-index: 2;
            min-height: 780px;
            /* Match height of register card */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .auth-form-content {
            padding: 10px 50px 30px 50px;
        }

        .form-label {
            color: #451a03 !important;
            font-weight: 800 !important;
            font-size: 15px !important;
        }

        .form-input {
            background: rgba(255, 255, 255, 0.9) !important;
            border: 2px solid #ecd8b9 !important;
            color: #451a03 !important;
            border-radius: 15px !important;
            height: 48px !important;
        }

        .btn-auth {
            background: linear-gradient(180deg, #f5d372 0%, #d4a33b 100%) !important;
            border: 2px solid #b48a2e !important;
            color: #451a03 !important;
            font-weight: 800 !important;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(212, 163, 59, 0.4) !important;
            border-radius: 15px !important;
            margin-top: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 163, 59, 0.6) !important;
        }

        .auth-footer,
        .forgot-link {
            color: #451a03 !important;
            font-weight: 700 !important;
            font-size: 14px !important;
        }

        .auth-footer a {
            color: #d4a33b !important;
        }
    </style>
</head>

<body style="display:flex; flex-direction:column; min-height:100vh;">

    <!-- Background Layer (overridden by auth-container mostly, but here for top) -->
    <div
        style="position:fixed; top:0; left:0; right:0; bottom:0; background: url('https://images.unsplash.com/photo-1513002749550-c59d8172ceec?auto=format&fit=crop&q=80') center center / cover no-repeat; z-index:-1;">
    </div>

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Main Content wrapper -->
    <div class="auth-container">
        <div class="auth-card-wrapper animate-bounce">
            <div class="auth-card-main">
                <!-- Tabs inside the card -->
                <div class="auth-tabs d-flex">
                    <div class="auth-tab active">Log In</div>
                    <a href="/register" class="auth-tab" style="text-decoration:none;">Register</a>
                </div>

                <div class="auth-form-content">
                    <form id="loginForm">
                        <div class="form-group">
                            <label class="form-label"><i class="fa-regular fa-envelope"></i> Email</label>
                            <div class="input-wrapper">
                                <i class="fa-regular fa-envelope input-icon"></i>
                                <input type="email" class="form-input" placeholder="adventurer@email.com" id="email">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-lock input-icon"></i>
                                <input type="password" class="form-input" placeholder="••••••••" id="password">
                            </div>
                        </div>

                        <div class="auth-options">
                            <label class="auth-checkbox">
                                <input type="checkbox" checked style="accent-color: #d4a33b;">
                                Remember Me
                            </label>
                            <a href="#" class="forgot-link">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn-auth" id="login">Log In</button>

                        <div class="auth-footer">
                            Don't have an account? <a href="/register">Sign Up &gt;</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Offcanvas Placeholder -->
    <div id="offcanvas-placeholder"></div>

    <!-- Global JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/demo.js"></script>
    <script src="/js/alert.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
