<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geofroggy Stories</title>
    <!-- Fonts -->
    <link href="https://unpkg.com/aos@2.3.0/dist/aos.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Quicksand:wght@300..700&family=Rubik:ital,wght@0,300..900;1,300..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet" />
    <!-- FontAwesome for quick icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />


</head>

<body>

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>


    <!-- Main Content wrapper -->
    <div class="parallax-container-story" style=" background-image: url(/assets/bg-backgrounds.jpg);">



        <div class="titeles-story-tags ">
            <div class="container">
                <div class="titels-tags text-center d-block">
                    <img src="/assets/titels015.png" alt="mg" />
                </div>
                <div class="para-story">
                    <p>Fun and educational stories from
                        around the world!</p>
                </div>
            </div>

        </div>



        <!-- Story Topics Selectors -->

        <div class="tabs-sections-stirue position-relative">
            <div class="container">
                <div class="controls justify-content-center d-flex">

                    <button class="filter active" data-filter="all">
                        <span>
                            All
                        </span>
                    </button>
                    <button class="filter" data-filter=".category-1">
                        <span> History </span> </button>
                    <button class="filter" data-filter=".category-2"><span> Culture </span> </button>
                    <button class="filter" data-filter=".category-3"><span> Nature </span> </button>
                    <button class="filter" data-filter=".category-4"><span> Animals </span> </button>
                </div>

                <div class="pager-list">
                    <!-- Pagination buttons will be generated here -->
                </div>



                <div id="Container" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 gx-lg-2 mt-5">
                    <!-- Stories will be loaded dynamically here -->
                    <div class="text-center w-100 py-5">
                        <div class="spinner-border text-warning" role="status">
                            <span class="visually-hidden">Loading stories...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>


    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>


    <!-- Offcanvas Placeholder -->
    <div id="offcanvas-placeholder"></div>


    <!-- Global JS -->
    <script src="https://unpkg.com/aos@2.3.0/dist/aos.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/jquery.mixitup/latest/jquery.mixitup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/stories.js"></script>
    <script src="/js/demo.js"></script>

    <script>
        AOS.init({
            duration: 1500,
            easing: 'ease-in-out-cubic',
            once: true,
            mirror: false
        });
    </script>
</body>

</html>
