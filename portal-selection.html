<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Selection - Geofroggy</title>
    <!-- Fonts -->
    <link href="https://unpkg.com/aos@2.3.0/dist/aos.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Quicksand:wght@300..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet" />
    <!-- FontAwesome for quick icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />

    <style>
        .portal-selection-wrapper {
            background-image: url('/assets/bg-backgrounds.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 120px 0 80px 0; /* Space for header */
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 80px;
            position: relative;
            z-index: 2;
        }

        .portal-title {
            font-family: 'Playfair', serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: #3E2723;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .portal-title::before, .portal-title::after {
            content: "🌿"; /* Fallback leaf emoji or icon */
            font-size: 2rem;
            color: #558B2F;
        }

        .portal-subtitle {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4E342E;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .portal-subtitle::before, .portal-subtitle::after {
            content: "";
            height: 1px;
            width: 40px;
            background-color: #8D6E63;
        }

        .portals-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            max-width: 1200px;
            width: 100%;
            padding: 0 20px;
            z-index: 2;
        }

        .portal-card-container {
            position: relative;
            width: 480px;
            max-width: 100%;
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
            margin-top: 80px; /* Space for the frog sticking out */
        }

        .portal-card-container:hover {
            transform: translateY(-10px);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
        }

        .portal-frog {
            position: absolute;
            top: -160px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            z-index: 5;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .portal-card-container:hover .portal-frog {
            transform: translateX(-50%) translateY(-10px) scale(1.05);
        }

        .portal-card-bg {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 20px;
            position: relative;
            z-index: 2;
        }

        .portal-footer-notice {
            background-image: url('/assets/bg-card.png'); /* Or another suitable small bg */
            background-size: cover;
            background-position: center;
            padding: 15px 30px;
            border-radius: 15px;
            margin-top: 60px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }
        
        .notice-content {
            display: flex;
            align-items: center;
            gap: 15px;
            background-color: rgba(248, 241, 227, 0.9); /* Parchment color overlay if bg is too dark */
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px dashed #C8B89E;
        }

        .notice-icon {
            background-color: #D7CCC8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #5D4037;
        }

        .notice-text {
            font-family: 'Nunito', sans-serif;
            color: #4E342E;
            font-size: 0.95rem;
            margin: 0;
            line-height: 1.4;
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .portals-container {
                gap: 30px;
            }
            .portal-card-container {
                width: 420px;
            }
        }

        @media (max-width: 768px) {
            .portal-title {
                font-size: 2.5rem;
            }
            .portal-card-container {
                width: 90%;
                margin-top: 100px;
            }
            .portal-frog {
                width: 200px;
                top: -120px;
            }
            .portals-container {
                flex-direction: column;
                align-items: center;
                gap: 60px;
            }
        }
    </style>
</head>

<body>

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <div class="portal-selection-wrapper">
        
        <!-- Title Section -->
        <div class="portal-header" data-aos="fade-down">
            <h1 class="portal-title">Choose Your Adventure</h1>
            <div class="portal-subtitle">Select your learning journey</div>
        </div>

        <!-- Cards Section -->
        <div class="portals-container">
            
            <!-- Kids Portal Card -->
            <div class="portal-card-container" data-aos="fade-up" data-aos-delay="100" onclick="window.location.href='index.html'">
                <img src="/assets/kid-frog.png" alt="Kids Frog" class="portal-frog" />
                <img src="/assets/card-kid.png" alt="Kids Portal" class="portal-card-bg" />
            </div>

            <!-- Teen Portal Card -->
            <div class="portal-card-container" data-aos="fade-up" data-aos-delay="200" onclick="window.location.href='dashboard.html'">
                <img src="/assets/Teen-frog.png" alt="Teen Frog" class="portal-frog" />
                <img src="/assets/teen-card.png" alt="Teen Portal" class="portal-card-bg" />
            </div>

        </div>

        <!-- Footer Notice -->
        <div class="portal-footer-notice" data-aos="fade-up" data-aos-delay="300">
            <div class="notice-content">
                <div class="notice-icon">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div class="notice-text">
                    You can switch between portals anytime<br>
                    Your progress is always saved!
                </div>
            </div>
        </div>

    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Offcanvas Placeholder -->
    <div id="offcanvas-placeholder"></div>

    <!-- Global JS -->
    <script src="https://unpkg.com/aos@2.3.0/dist/aos.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/demo.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            easing: 'ease-out-cubic',
            once: true,
            mirror: false
        });
    </script>
</body>
</html>
