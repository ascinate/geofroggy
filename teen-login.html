<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teen Portal - Authentication</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        body {
            background-image: url('/assets/hills-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            font-family: 'Nunito', sans-serif;
        }

        .auth-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            display: flex;
            min-height: 700px;
        }

        .auth-section {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            transition: all 0.5s ease;
        }

        /* Login Side (Dark) */
        .login-section {
            background: rgba(13, 27, 42, 0.9);
            color: white;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Register Side (Light) */
        .register-section {
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a1a;
        }

        .auth-header {
            margin-bottom: 30px;
        }

        .auth-header span {
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.8;
        }

        .auth-header h2 {
            font-family: 'Playfair', serif;
            font-size: 2.8rem;
            font-weight: 900;
            margin: 5px 0;
        }

        .frog-avatar {
            width: 150px;
            margin: 20px auto;
            display: block;
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
        }

        .form-control {
            height: 50px;
            padding-left: 45px !important;
            border-radius: 12px;
            border: 2px solid rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            transition: all 0.3s;
        }

        .login-section .form-control {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .login-section .form-control::placeholder { color: rgba(255,255,255,0.4); }

        .form-control:focus {
            outline: none;
            box-shadow: none;
            border-color: #1565C0;
            background: white;
            color: #1a1a1a;
        }

        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .auth-options a {
            color: #1565C0;
            text-decoration: none;
            font-weight: 700;
        }

        .btn-auth {
            height: 55px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-login {
            background: #1565C0;
            color: white;
        }

        .btn-register {
            background: #2E7D32;
            color: white;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            opacity: 0.9;
        }

        /* OR Divider */
        .or-divider {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: #1a1a1a;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border: 4px solid rgba(255,255,255,0.2);
            z-index: 10;
        }

        /* Mobile Switcher */
        .mobile-toggle {
            display: none;
            background: rgba(0,0,0,0.8);
            border-radius: 50px;
            padding: 5px;
            margin-bottom: 30px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .toggle-btn {
            padding: 8px 25px;
            border-radius: 50px;
            border: none;
            background: transparent;
            color: white;
            font-weight: 700;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: #1565C0;
        }

        @media (max-width: 992px) {
            .auth-container {
                flex-direction: column;
                max-width: 500px;
                min-height: auto;
            }

            .or-divider {
                display: none;
            }

            .mobile-toggle {
                display: flex;
            }

            .auth-section {
                display: none;
            }

            .auth-section.active {
                display: flex;
            }
        }
    </style>
</head>

<body>

    <div class="d-flex flex-column align-items-center w-100">
        
        <!-- Mobile Toggle -->
        <div class="mobile-toggle">
            <button class="toggle-btn active" onclick="switchTab('login')">Log In</button>
            <button class="toggle-btn" onclick="switchTab('register')">Register</button>
        </div>

        <div class="auth-container">
            
            <!-- Login Section -->
            <div class="auth-section login-section active" id="login-panel">
                <div class="auth-header">
                    <span>Welcome Back,</span>
                    <h2>Explorer!</h2>
                    <p>Continue your journey and explore the world like never before.</p>
                </div>

                <img src="/assets/Teen-frog.png" alt="Teen Frog" class="frog-avatar">

                <form id="teenLoginForm">
                    <h5 class="mb-4 fw-bold">Log In To Your Account</h5>
                    
                    <div class="form-group">
                        <div class="input-group">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" class="form-control" placeholder="Email address" id="login-email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="form-control" placeholder="Password" id="login-password" required>
                        </div>
                    </div>

                    <div class="auth-options">
                        <label class="d-flex align-items-center gap-2">
                            <input type="checkbox" checked> Remember me
                        </label>
                        <a href="#">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn-auth btn-login">
                        Log In <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>
            </div>

            <!-- OR Divider -->
            <div class="or-divider">OR</div>

            <!-- Register Section -->
            <div class="auth-section register-section" id="register-panel">
                <div class="auth-header">
                    <span>Start Your Adventure,</span>
                    <h2>Explorer!</h2>
                    <p>Create your account and begin your exploration today.</p>
                </div>

                <form id="teenRegisterForm">
                    <h5 class="mb-4 fw-bold">Create New Account</h5>
                    
                    <div class="form-group">
                        <div class="input-group">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" class="form-control" placeholder="Full name" id="reg-username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" class="form-control" placeholder="Email address" id="reg-email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="form-control" placeholder="Password" id="reg-password" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="input-group">
                            <i class="fa-solid fa-shield"></i>
                            <input type="password" class="form-control" placeholder="Confirm password" id="reg-confirm" required>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="d-flex align-items-center gap-2 small opacity-75">
                            <input type="checkbox" required> I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>.
                        </label>
                    </div>

                    <button type="submit" class="btn-auth btn-register">
                        Create Account <i class="fa-solid fa-arrow-right"></i>
                    </button>

                    <div class="text-center mt-4 d-lg-none">
                        Already have an account? <a href="#" onclick="switchTab('login')" class="text-primary fw-bold text-decoration-none">Log in</a>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/alert.js"></script>

    <script>
        // Tab switching logic
        function switchTab(tab) {
            const loginPanel = document.getElementById('login-panel');
            const registerPanel = document.getElementById('register-panel');
            const btns = document.querySelectorAll('.toggle-btn');

            if (tab === 'login') {
                loginPanel.classList.add('active');
                registerPanel.classList.remove('active');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginPanel.classList.remove('active');
                registerPanel.classList.add('active');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
        }

        // Authentication Logic
        const baseUrl = window.APP_CONFIG.API_BASE_URL.replace(/\/$/, "");

        // Login Handler
        document.getElementById('teenLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch(`${baseUrl}/api/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert("success", "Login Successful. Redirecting...");
                    localStorage.setItem("token", data.session.access_token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    setTimeout(() => window.location.href = "/dashboard.html", 2000);
                } else {
                    showAlert("error", data.error || "Login Failed");
                }
            } catch (err) {
                showAlert("error", "Connection error. Make sure the backend is running.");
            }
        });

        // Register Handler
        document.getElementById('teenRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (password !== confirm) {
                return showAlert("error", "Passwords do not match!");
            }

            try {
                const res = await fetch(`${baseUrl}/api/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        username, 
                        email, 
                        password, 
                        age_group: 'Teen', 
                        role: 'user' 
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert("success", "Account Created! Please login.");
                    switchTab('login');
                } else {
                    showAlert("error", data.error || "Registration Failed");
                }
            } catch (err) {
                showAlert("error", "Connection error. Make sure the backend is running.");
            }
        });
    </script>
</body>

</html>
