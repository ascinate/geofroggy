<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teen Portal Login - Geofroggy</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400;1,700&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/style.css">
    
    <style>
        body {
            background-image: url('/assets/hills-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.2); /* Darken bg slightly for readability */
        }

        .auth-card-wrapper {
            max-width: 450px;
            width: 100%;
            position: relative;
        }

        .auth-card-main {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .auth-logo {
            width: 120px;
            margin-bottom: 30px;
        }

        .auth-title {
            font-family: 'Playfair', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: #0D47A1;
            margin-bottom: 10px;
        }

        .auth-subtitle {
            font-family: 'Nunito', sans-serif;
            color: #546E7A;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .form-label {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #263238;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #0D47A1;
            font-size: 1.1rem;
        }

        .form-input {
            width: 100%;
            height: 55px;
            padding-left: 45px;
            padding-right: 20px;
            border-radius: 12px;
            border: 2px solid #CFD8DC;
            background: #F5F7F8;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #0D47A1;
            background: white;
            box-shadow: 0 0 10px rgba(13, 71, 161, 0.1);
        }

        .btn-auth {
            width: 100%;
            height: 55px;
            background: linear-gradient(to right, #1565C0, #0D47A1);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(13, 71, 161, 0.4);
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(13, 71, 161, 0.5);
        }

        .auth-footer {
            margin-top: 30px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: #546E7A;
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #1565C0;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card-main {
                padding: 40px 25px;
            }
        }
    </style>
</head>

<body>

    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <div class="auth-container">
        <div class="auth-card-wrapper">
            <div class="auth-card-main">
                <img src="/assets/Teen-frog.png" alt="Teen Frog" class="auth-logo">
                <h1 class="auth-title">Teen Login</h1>
                <p class="auth-subtitle">Challenge. Explore. Achieve.</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope input-icon"></i>
                            <input type="email" class="form-input" placeholder="teen@geofroggy.com" id="email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" class="form-input" placeholder="••••••••" id="password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth" id="login">Enter Portal</button>

                    <div class="auth-footer">
                        Don't have an account? <a href="/register">Sign Up</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Global JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/demo.js"></script>
    <script src="/js/alert.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
